<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>灵珑 · 气泡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:300px;height:140px;background:transparent;overflow:hidden;
  user-select:none;font-family:'HarmonyOS Sans SC','PingFang SC','Microsoft YaHei','Segoe UI',system-ui,sans-serif;
}

:root{
  --accent:#74F6E8;
  --gold:#D4A847;
  --gold-soft:rgba(212,168,71,.35);
}

#bubble{
  position:absolute;left:8px;top:6px;right:8px;bottom:24px;
  background:linear-gradient(160deg,rgba(28,28,36,.96),rgba(20,18,12,.96));
  border:1px solid var(--gold-soft);
  border-radius:14px;
  box-shadow:0 12px 32px rgba(0,0,0,.55),
             0 0 24px rgba(212,168,71,.12),
             inset 0 1px 0 rgba(255,255,255,.05);
  padding:10px 14px 12px;
  display:flex;flex-direction:column;
  cursor:pointer;
  opacity:0;transform:translateY(8px) scale(.96);
  transition:opacity .32s ease,transform .32s cubic-bezier(.22,.61,.36,1);
}
#bubble.show{opacity:1;transform:translateY(0) scale(1)}
#bubble:hover{
  border-color:var(--gold);
  box-shadow:0 14px 36px rgba(0,0,0,.6),
             0 0 28px rgba(212,168,71,.22),
             inset 0 1px 0 rgba(255,255,255,.07);
}

#head{
  display:flex;align-items:center;gap:6px;font-size:10px;
  color:#bfb59a;letter-spacing:1px;text-transform:uppercase;
  margin-bottom:5px;
}
#head .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent)}
#head .name{color:#e6dcc4;font-weight:600}
#head .close{
  margin-left:auto;width:18px;height:18px;border-radius:50%;
  border:none;background:rgba(255,255,255,.06);color:#888;
  font-size:11px;line-height:1;cursor:pointer;display:flex;
  align-items:center;justify-content:center;transition:all .2s;
}
#head .close:hover{background:rgba(255,255,255,.12);color:#ddd}

#text{
  font-size:12.5px;line-height:1.55;color:#e6dcc4;
  flex:1;overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:4;-webkit-box-orient:vertical;
  text-overflow:ellipsis;word-break:break-word;
}

#tail{
  position:absolute;bottom:14px;left:50%;
  width:18px;height:18px;background:rgba(20,18,12,.96);
  border-right:1px solid var(--gold-soft);
  border-bottom:1px solid var(--gold-soft);
  transform-origin:center;
  transform:translateX(-50%) rotate(45deg);
}

#cta{
  font-size:10px;color:#8a7f5e;margin-top:4px;
  display:flex;align-items:center;gap:4px;
}
#cta .arrow{color:var(--gold)}
</style>
</head>
<body>
<div id="bubble">
  <div id="head">
    <div class="dot" id="agent-dot"></div>
    <div class="name" id="agent-name">灵珑</div>
    <button class="close" id="close-btn" title="关闭">×</button>
  </div>
  <div id="text">…</div>
  <div id="cta">点击查看完整回复 <span class="arrow">›</span></div>
</div>
<div id="tail"></div>

<script>
const bubble = document.getElementById('bubble');
const textEl = document.getElementById('text');
const nameEl = document.getElementById('agent-name');
const dotEl  = document.getElementById('agent-dot');
const closeBtn = document.getElementById('close-btn');

const AGENT_INFO = {
  claude:   { name: 'Claude',   color: '#74F6E8' },
  openclaw: { name: 'OpenClaw', color: '#D4A847' },
  hermes:   { name: 'Hermes',   color: '#66E6D5' },
};

function stripMarkdown(s) {
  return s
    .replace(/```[\s\S]*?```/g, '〔代码块〕')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/!\[[^\]]*\]\([^)]*\)/g, '')
    .replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')
    .replace(/[*_#>]/g, '')
    .replace(/\n{2,}/g, ' · ')
    .replace(/\n/g, ' ')
    .trim();
}

window.robot.onBubbleShow(({ text, agent }) => {
  const info = AGENT_INFO[agent] || { name: '灵珑', color: '#74F6E8' };
  nameEl.textContent = info.name;
  dotEl.style.background = info.color;
  dotEl.style.boxShadow = `0 0 6px ${info.color}`;
  textEl.textContent = stripMarkdown(text || '');
  // ensure transition triggers
  bubble.classList.remove('show');
  requestAnimationFrame(() => requestAnimationFrame(() => bubble.classList.add('show')));
});

window.robot.onBubbleHide(() => {
  bubble.classList.remove('show');
});

bubble.addEventListener('click', e => {
  if (e.target === closeBtn) return;
  window.robot.bubbleClick();
});
closeBtn.addEventListener('click', e => {
  e.stopPropagation();
  window.robot.bubbleDismiss();
});
</script>
</body>
</html>
